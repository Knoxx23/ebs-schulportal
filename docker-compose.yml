# EBS - Einschulungsblatt Management System
# Docker Compose für Coolify oder lokalen Betrieb
#
# Verwendung:
#   docker-compose up -d        (Starten)
#   docker-compose down         (Stoppen)
#   docker-compose logs -f      (Logs ansehen)

services:
  ebs:
    build: .
    container_name: ebs-app
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ebs-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-key}
      - COOKIE_SECRET=${COOKIE_SECRET:-please-change-this-cookie-secret}
      - DB_PATH=/app/data/ebs.db
      - DOCUMENTS_PATH=/app/data/documents
      - APP_URL=${APP_URL:-http://localhost:3001}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@schule.de}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ebs-data:
    driver: local
